name: Python Wheels

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build 🐍 sdist
    runs-on: ubuntu-20.04

    steps:
      - name: Check Triggers
        uses: khan/pull-request-comment-trigger@master
        id: check
        with:
          trigger: 'build python'

      - name: Checkout
        if: steps.check.outputs.triggered == 'true'
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Setup Python
        if: steps.check.outputs.triggered == 'true'
        uses: actions/setup-python@v2

      - name: Dependencies
        if: steps.check.outputs.triggered == 'true'
        run: python -m pip install scikit-build twine

      - name: Build sdist
        if: steps.check.outputs.triggered == 'true'
        run: python setup.py sdist

      - name: Check metadata
        if: steps.check.outputs.triggered == 'true'
        run: twine check dist/*

      - name: Upload Artifacts
        if: steps.check.outputs.triggered == 'true'
        uses: actions/upload-artifact@v2
        with:
          path: dist/*.tar.gz
          retention-days: 2

  build_wheels:
    name: Build 🐍 wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04, macos-latest, windows-2016]

    steps:
      - name: Check Triggers
        uses: khan/pull-request-comment-trigger@master
        id: check
        with:
          trigger: 'build python'

      - name: Checkout
        if: steps.check.outputs.triggered == 'true'
        uses: actions/checkout@v2
        with:
          submodules: true

      - name: Setup Python
        if: steps.check.outputs.triggered == 'true'
        uses: actions/setup-python@v2

      - name: Dependencies
        if: steps.check.outputs.triggered == 'true'
        run: |
          python -m pip install cibuildwheel==1.7.4

      - name: Build wheels
        if: steps.check.outputs.triggered == 'true'
        env:
          CIBW_SKIP: "cp27-* pp27-* cp35-*"
          CIBW_BEFORE_BUILD_MACOS: >
            brew install openblas &&
            export OPENBLAS="$(brew --prefix openblas)" &&
            python -m pip install numpy
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: "python -m pytest {project}/test"
        run: |
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload Artifacts
        if: steps.check.outputs.triggered == 'true'
        uses: actions/upload-artifact@v2
        with:
          path: ./wheelhouse/*.whl
          retention-days: 2